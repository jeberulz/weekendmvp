name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Check internal links (strict)
        run: STRICT=1 npm run check:links

      - name: Check stylesheets (strict)
        run: STRICT=1 npm run check:stylesheets

      - name: Check nav sync (strict)
        run: STRICT=1 npm run check:nav

      - name: Check idea nav sync (strict)
        run: STRICT=1 npm run check:idea-nav

      - name: Check reading nav sync (strict)
        run: STRICT=1 npm run check:reading-nav

      - name: Check starter kit nav sync (strict)
        run: STRICT=1 npm run check:starter-kit-nav
